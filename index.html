<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <title>TRX Chart — Live</title>
    <script src="lightweight-charts.standalone.production.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #131722;
            height: 100vh;           /* fallback for older browsers */
            height: 100dvh;          /* override: dynamic viewport — accounts for browser chrome */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* iOS safe area for home indicator / browser bottom bar */
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* Header */
        .header {
            height: 48px;
            background: #fff;
            border-bottom: 1px solid #e0e3eb;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            flex-shrink: 0;
        }
        .logo {
            display: flex; align-items: center; gap: 7px;
            font-weight: 700; font-size: 15px; color: #131722;
            user-select: none;
        }
        .logo-mark {
            width: 30px; height: 30px; background: #2962ff;
            border-radius: 7px; display: flex; align-items: center;
            justify-content: center; color: #fff;
            font-size: 14px; font-weight: 800;
        }
        /* CYB3R R00T fancy neon fire text */
        .fire-logo-wrap {
            position: relative; display: inline-flex;
            align-items: center; cursor: default;
        }
        .fire-logo-wrap canvas#fireCanvas {
            position: absolute; bottom: -4px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none; z-index: 20;
        }
        /* Night mode (default) — bright golden neon fire */
        .cyb3r-text {
            font-family: 'Orbitron', monospace;
            font-weight: 900; font-size: 13px; letter-spacing: 2px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 40%, #ffd700 70%, #fffacd 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 6px rgba(255,180,0,0.9)) drop-shadow(0 0 12px rgba(255,100,0,0.7));
            animation: neonPulse 2s ease-in-out infinite alternate;
        }
        /* Day mode — deep orange/gold visible on white background */
        body:not(.night) .cyb3r-text {
            background: linear-gradient(135deg, #b8600a 0%, #d4820a 40%, #b8600a 70%, #8b4500 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 1px 2px rgba(180,80,0,0.5)) drop-shadow(0 0 4px rgba(200,100,0,0.3));
            animation: neonPulseDay 2s ease-in-out infinite alternate;
        }
        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 4px rgba(255,180,0,0.8)) drop-shadow(0 0 10px rgba(255,100,0,0.6)); }
            to   { filter: drop-shadow(0 0 8px rgba(255,200,0,1))   drop-shadow(0 0 18px rgba(255,80,0,0.9)) drop-shadow(0 0 30px rgba(255,50,0,0.5)); }
        }
        @keyframes neonPulseDay {
            from { filter: drop-shadow(0 1px 2px rgba(160,70,0,0.5)) drop-shadow(0 0 3px rgba(180,90,0,0.3)); }
            to   { filter: drop-shadow(0 1px 4px rgba(200,90,0,0.7)) drop-shadow(0 0 6px rgba(220,110,0,0.5)); }
        }
        .h-sep { width: 1px; height: 24px; background: #e0e3eb; }
        .issue-row { display: flex; gap: 16px; }
        .issue-cell { display: flex; flex-direction: column; gap: 1px; }
        .issue-lbl { font-size: 10px; color: #787b86; text-transform: uppercase; letter-spacing: .4px; }
        .issue-val { font-size: 13px; font-weight: 600; }
        .spacer { flex: 1; }
        .updated-lbl { font-size: 11px; color: #adb0bc; }
        .live-pill {
            display: flex; align-items: center; gap: 5px;
            background: #f0f7ff; border: 1px solid #d0e4ff;
            color: #2962ff; padding: 4px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
        }
        .live-dot {
            width: 6px; height: 6px; background: #26a69a;
            border-radius: 50%; animation: blink 1.4s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

        /* Night Mode Toggle */
        .night-toggle {
            display: flex; align-items: center; gap: 6px;
            cursor: pointer; user-select: none;
            padding: 4px 10px; border-radius: 20px;
            border: 1px solid #e0e3eb;
            background: #f8f9fd;
            font-size: 11px; font-weight: 600;
            color: #787b86;
            transition: all .2s;
        }
        .night-toggle:hover { background: #f0f3fa; color: #131722; }
        .toggle-track {
            width: 30px; height: 16px;
            background: #e0e3eb; border-radius: 8px;
            position: relative; transition: background .25s;
            flex-shrink: 0;
        }
        .toggle-thumb {
            width: 12px; height: 12px;
            background: #fff; border-radius: 50%;
            position: absolute; top: 2px; left: 2px;
            transition: transform .25s, background .25s;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .toggle-track.on { background: #2962ff; }
        .toggle-track.on .toggle-thumb { transform: translateX(14px); }
        .toggle-icon { font-size: 13px; }

        /* Night Mode styles */
        body.night {
            background: #0a0a0f;
            color: #d1d4dc;
        }
        body.night .header {
            background: #131722;
            border-bottom-color: #2a2a35;
        }
        body.night .logo { color: #d1d4dc; }
        body.night .h-sep { background: #2a2a35; }
        body.night .issue-val { color: #d1d4dc; }
        body.night .toolbar {
            background: #131722;
            border-bottom-color: #2a2a35;
        }
        body.night .tb-btn { color: #787b86; }
        body.night .tb-btn:hover { background: #1e1e28; color: #d1d4dc; }
        body.night .tb-btn.active { background: rgba(41,98,255,.2); color: #5c8fff; border-color: rgba(41,98,255,.4); }
        body.night .tb-sep { background: #2a2a35; }
        body.night .panel {
            background: #131722;
            border-left-color: #2a2a35;
        }
        body.night .profile-header { background: #131722; border-bottom-color: #2a2a35; }
        body.night .profile-avatar { border-color: #2a2a35; }
        body.night .profile-sub { color: #5c8fff; }
        body.night .panel-block { border-bottom-color: #2a2a35; }
        body.night .panel-heading { color: #555; }
        body.night .pred-for { color: #555; }
        body.night .conf-row { color: #555; }
        body.night .conf-track { background: #1e1e28; }
        body.night .strategy-note { background: #1a1a24; color: #787b86; }
        body.night .history-scroll::-webkit-scrollbar-thumb { background: #2a2a35; }
        body.night .h-row { background: #1a1a24; }
        body.night .h-issue { color: #555; }
        body.night .stats-row { border-top-color: #2a2a35; }
        body.night .stat-n { color: #d1d4dc; }
        body.night .stat-l { color: #555; }
        body.night .night-toggle { background: #1a1a24; border-color: #2a2a35; color: #555; }
        body.night .night-toggle:hover { background: #1e1e28; color: #d1d4dc; }
        body.night .loading-overlay { background: rgba(10,10,15,.92); }
        body.night .loading-txt { color: #555; }

        /* Layout */
        .workspace { flex: 1; display: flex; overflow: hidden; }
        .chart-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        /* Toolbar */
        .toolbar {
            height: 37px; background: #fff; border-bottom: 1px solid #e0e3eb;
            display: flex; align-items: center; padding: 0 10px; gap: 2px; flex-shrink: 0;
            overflow-x: auto; overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .toolbar::-webkit-scrollbar { display: none; }
        .toolbar > * { flex-shrink: 0; }
        .tb-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 5px 10px; background: transparent;
            border: 1px solid transparent; border-radius: 4px;
            cursor: pointer; font-size: 12px; color: #787b86;
            white-space: nowrap; transition: background .12s, color .12s, border-color .12s;
            user-select: none;
        }
        .tb-btn:hover { background: #f0f3fa; color: #131722; }
        .tb-btn.active { background: #e8f0fe; color: #2962ff; border-color: rgba(41,98,255,.4); }
        /* Icon-only compact button */
        .tb-ic { min-width: 30px; padding: 5px 7px; font-size: 13px; }
        .tb-ic svg { display: block; }
        .tb-btn.danger { color: #ef5350; }
        .tb-btn.danger:hover { background: rgba(239,83,80,.08); border-color: rgba(239,83,80,.3); }
        .tb-sep { width: 1px; height: 20px; background: #e0e3eb; margin: 0 4px; }
        /* TF Dropdown */
        .tf-wrap { position: relative; margin-left: 4px; }
        .tf-select {
            appearance: none; -webkit-appearance: none;
            background: #e8f0fe; border: 1px solid rgba(41,98,255,.3);
            color: #2962ff; font-size: 11px; font-weight: 700;
            padding: 4px 22px 4px 10px; border-radius: 6px;
            cursor: pointer; outline: none; letter-spacing: 0.4px;
        }
        .tf-arrow {
            position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
            pointer-events: none; color: #2962ff; font-size: 9px;
        }
        body.night .tf-select { background: rgba(41,98,255,.15); border-color: rgba(41,98,255,.3); color: #5c8fff; }
        body.night .tf-arrow { color: #5c8fff; }

        /* Chart */
        .chart-wrap { flex: 1; position: relative; overflow: hidden; min-height: 0; }
        #tvChart { position: absolute; inset: 0; }

        /* Myanmar flag watermark — full chart */
        .flag-watermark {
            position: absolute;
            inset: 0;
            background-image: url('images/mm.svg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            opacity: 0.04;
            z-index: 5;
            pointer-events: none;
        }
        /* Portrait phones */
        @media (orientation: portrait) {
            .flag-watermark { background-size: 100% 100%; }
        }
        @media (orientation: landscape) {
            .flag-watermark { background-size: cover; }
        }

        /* Mobile: ensure time scale has breathing room */
        @media (max-width: 768px) {
            .workspace { padding-bottom: 2px; }
            .chart-wrap { padding-bottom: 0; }
        }
        /* Small portrait: hide panel (already at 720px but reinforce) */
        @media (max-width: 720px) and (orientation: portrait) {
            .panel { display: none; }
            body { padding-bottom: env(safe-area-inset-bottom, 34px); }
        }
        /* Landscape mobile: browser bottom bar covers time scale — push chart up */
        @media (max-height: 500px) and (orientation: landscape) {
            body { padding-bottom: env(safe-area-inset-bottom, 28px); }
            .header { height: 38px; }
            .toolbar { height: 32px; }
        }

        /* Loading */
        .loading-overlay {
            position: absolute; inset: 0;
            background: rgba(255,255,255,.92);
            display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 50;
        }
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid #e0e3eb; border-top-color: #2962ff;
            border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-txt { font-size: 13px; color: #787b86; }

        /* Right Panel */
        .panel {
            width: 210px; border-left: 1px solid #e0e3eb;
            background: #fff; display: flex; flex-direction: column;
            flex-shrink: 0; overflow: hidden;
        }
        .panel-block { padding: 14px 16px; border-bottom: 1px solid #e0e3eb; }
        .panel-heading {
            font-size: 10px; font-weight: 700; color: #787b86;
            text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
        }

        /* Prediction */
        .pred-wrap { text-align: center; }
        .pred-for { font-size: 11px; color: #787b86; margin-bottom: 8px; }
        .pred-badge {
            display: inline-block; padding: 6px 18px;
            border-radius: 6px; font-size: 18px; font-weight: 800;
            letter-spacing: 1px; margin-bottom: 10px;
        }
        .pred-badge.big {
            background: rgba(38,166,154,.08);
            color: #26a69a;
            border: 1px solid #26a69a;
            animation: neonGreen 1.6s ease-in-out infinite;
            text-shadow: 0 0 8px #26a69a, 0 0 18px #26a69a;
        }
        .pred-badge.small {
            background: rgba(239,83,80,.08);
            color: #ef5350;
            border: 1px solid #ef5350;
            animation: neonRed 1.6s ease-in-out infinite;
            text-shadow: 0 0 8px #ef5350, 0 0 18px #ef5350;
        }
        .pred-badge.wait {
            background: rgba(120,123,134,.08);
            color: #adb0bc;
            border: 1px solid #e0e3eb;
        }
        @keyframes neonGreen {
            0%, 100% {
                box-shadow: 0 0 6px rgba(38,166,154,.5), 0 0 14px rgba(38,166,154,.4), 0 0 28px rgba(38,166,154,.2);
                border-color: #26a69a;
            }
            50% {
                box-shadow: 0 0 2px rgba(38,166,154,.2), 0 0 6px rgba(38,166,154,.2), 0 0 10px rgba(38,166,154,.1);
                border-color: rgba(38,166,154,.4);
            }
        }
        @keyframes neonRed {
            0%, 100% {
                box-shadow: 0 0 6px rgba(239,83,80,.5), 0 0 14px rgba(239,83,80,.4), 0 0 28px rgba(239,83,80,.2);
                border-color: #ef5350;
            }
            50% {
                box-shadow: 0 0 2px rgba(239,83,80,.2), 0 0 6px rgba(239,83,80,.2), 0 0 10px rgba(239,83,80,.1);
                border-color: rgba(239,83,80,.4);
            }
        }
        .conf-row { display: flex; justify-content: space-between; font-size: 11px; color: #787b86; margin-bottom: 5px; }
        .conf-track { height: 4px; background: #f0f3fa; border-radius: 2px; overflow: hidden; }
        .conf-bar { height: 100%; border-radius: 2px; transition: width .4s ease; }
        .conf-bar.high { background: #26a69a; } .conf-bar.medium { background: #ff9800; } .conf-bar.low { background: #ef5350; }
        .strategy-note {
            margin-top: 10px; font-size: 11px; color: #787b86;
            background: #f8f9fd; border-radius: 4px; padding: 7px 10px; line-height: 1.5;
        }

        /* History */
        .history-scroll { flex: 1; overflow-y: auto; padding: 10px 12px; }
        .history-scroll::-webkit-scrollbar { width: 4px; }
        .history-scroll::-webkit-scrollbar-thumb { background: #e0e3eb; border-radius: 2px; }
        .h-row {
            display: flex; align-items: center; padding: 6px 10px;
            border-radius: 4px; margin-bottom: 3px; background: #f8f9fd; gap: 8px;
        }
        .h-issue { color: #787b86; min-width: 54px; font-size: 11px; }
        .h-pred { font-weight: 700; padding: 1px 8px; border-radius: 3px; font-size: 11px; }
        .h-pred.big   { background: rgba(38,166,154,.15); color: #26a69a; }
        .h-pred.small { background: rgba(239,83,80,.15);  color: #ef5350; }
        .h-icon { margin-left: auto; font-size: 13px; }

        /* Profile header */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #e0e3eb;
            background: #fff;
        }
        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e3eb;
            flex-shrink: 0;
        }
        .profile-info { display: flex; flex-direction: column; gap: 2px; }
        .profile-name {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2px;
            color: #d4a017;
            text-decoration: none;
            cursor: pointer;
            animation: neonGold 2.2s ease-in-out infinite;
        }
        .profile-name:hover {
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        @keyframes neonGold {
            0%, 100% {
                color: #d4a017;
                text-shadow:
                    0 0 3px rgba(212,160,23,.5),
                    0 0 8px rgba(212,160,23,.3);
            }
            50% {
                color: #c49010;
                text-shadow:
                    0 0 2px rgba(212,160,23,.2),
                    0 0 4px rgba(212,160,23,.15);
            }
        }
        .profile-sub {
            font-size: 9px;
            font-weight: 600;
            color: #2962ff;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        /* Stats */
        .stats-row {
            display: flex; justify-content: space-around;
            padding: 12px 16px; border-top: 1px solid #e0e3eb;
        }
        .stat { text-align: center; }
        .stat-n { font-size: 15px; font-weight: 700; color: #131722; }
        .stat-l { font-size: 10px; color: #787b86; text-transform: uppercase; }

        /* Mobile */
        @media (max-width: 720px) { .panel { display: none; } }
        @media (max-width: 480px) { .updated-lbl { display: none; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">
        <div class="logo-mark">TX</div>
        <div class="fire-logo-wrap">
            <canvas id="fireCanvas" width="160" height="48"></canvas>
            <span class="cyb3r-text">TRX CHART</span>
        </div>
    </div>
    <div class="h-sep"></div>
    <div class="issue-row">
        <div class="issue-cell">
            <div class="issue-lbl">Current</div>
            <div class="issue-val" id="hCurrent">—</div>
        </div>
        <div class="issue-cell">
            <div class="issue-lbl">Next</div>
            <div class="issue-val" id="hNext">—</div>
        </div>
    </div>
    <div class="spacer"></div>
    <div class="updated-lbl" id="hUpdated"></div>
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="night-toggle" onclick="toggleNight()" id="nightToggle">
        <span class="toggle-icon" id="nightIcon">☀️</span>
        <div class="toggle-track" id="toggleTrack">
            <div class="toggle-thumb"></div>
        </div>
    </div>
</header>

<div class="workspace">
    <div class="chart-col">
        <div class="toolbar">
            <!-- Icon-only compact toolbar -->
            <button class="tb-btn tb-ic active" id="btnPointer" onclick="setTool('pointer')" title="Pointer">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M2 1l9 5-4.5 1.5L5 12z"></path></svg>
            </button>
            <button class="tb-btn tb-ic active" id="btnCrosshair" onclick="toggleCrosshair()" title="Crosshair">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="7" y1="1" x2="7" y2="13"></line><line x1="1" y1="7" x2="13" y2="7"></line><circle cx="7" cy="7" r="2"></circle></svg>
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-ic" id="btnTrend" onclick="setTool('trend')" title="Trend Line">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="12" x2="13" y2="2"></line><circle cx="1" cy="12" r="1.5" fill="currentColor"></circle><circle cx="13" cy="2" r="1.5" fill="currentColor"></circle></svg>
            </button>
            <button class="tb-btn tb-ic" id="btnSupport" onclick="setTool('support')" title="Support" style="color:#26a69a">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="10" x2="13" y2="10"></line><polyline points="4,13 4,10 10,10 10,13" stroke-width="1" opacity="0.5"></polyline></svg>
            </button>
            <button class="tb-btn tb-ic" id="btnResistance" onclick="setTool('resistance')" title="Resistance" style="color:#ef5350">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="4" x2="13" y2="4"></line><polyline points="4,1 4,4 10,4 10,1" stroke-width="1" opacity="0.5"></polyline></svg>
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-ic" id="btnAutoSR" onclick="toggleAutoSR()" title="Auto S/R">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"></circle><line x1="1" y1="4" x2="13" y2="4" stroke="#26a69a"></line><line x1="1" y1="10" x2="13" y2="10" stroke="#ef5350"></line></svg>
            </button>
            <button class="tb-btn tb-ic" id="btnRect" onclick="setTool('rect')" title="Rectangle">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="12" height="8" rx="1"></rect></svg>
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-ic" id="btnErase" onclick="setTool('erase')" title="Erase Line">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l3-3 5-5-2-2-5 5-3 3 2 2z"></path><line x1="8" y1="2" x2="12" y2="6"></line></svg>
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-ic danger" onclick="clearAllDrawings()" title="Clear All">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="12" y2="12"></line><line x1="12" y1="2" x2="2" y2="12"></line></svg>
            </button>
            <div class="tb-sep"></div>
            <button class="tb-btn tb-ic" onclick="saveChart()" title="Save Image">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="10" height="8" rx="1"></rect><polyline points="5,10 7,13 9,10"></polyline><line x1="7" y1="10" x2="7" y2="13"></line></svg>
            </button>
            <div class="tb-sep"></div>
            <div class="tf-wrap">
                <select class="tf-select" id="tfSelect" onchange="setTF(this.value)">

            <div class="profile-info">

                    <div style="display:flex;justify-content:space-between;align-items:center;font-size:9px;">
                        <span style="color:#787b86;">Flag Pattern</span>

            <div class="stat"><div class="stat-n" id="sCorrect">0</div><div class="stat-l">Correct</div></div>
            <div class="stat"><div class="stat-n" id="sAccuracy">—</div><div class="stat-l">Accuracy</div></div>

</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
// blockTime from TRX API is already in Myanmar Standard Time (UTC+6:30)
// Store it as a UTC Date so getUTCHours() etc. return MMT values directly
const indexToTime = {};   // M1 candle index → {y,mo,d,h,mi}
function parseMMT(s) {
    if (!s) return null;
    const p = s.split(/[- :]/);
    return { y:+p[0], mo:+p[1], d:+p[2], h:+p[3], mi:+p[4] };
}

const CFG = {
    FETCH_MS:    10000,
    MAX_CANDLES: 10000,
    UP_COLOR:   '#26a69a',
    DOWN_COLOR: '#ef5350',
    BODY:        0.02,
    WICK_R:      0.2,
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let chart, candleSeries;
let processedCandles   = [];   // M1 master candles (always)
let isFirstLoad        = true;
let lastCandlePrice    = 10000;
let lastProcessedIssue = null;

// Timeframe
let currentTF = 'M1';
const TF_GROUPS = { M1: 1, M15: 5, H1: 20 };

function aggregateCandles(candles, g) {
    const result = [];
    for (let i = 0; i < candles.length; i += g) {
        const grp = candles.slice(i, i + g);
        if (!grp.length) continue;
        result.push({
            time:  result.length,
            open:  grp[0].open,
            close: grp[grp.length - 1].close,
            high:  Math.max(...grp.map(c => c.high)),
            low:   Math.min(...grp.map(c => c.low)),
        });
    }
    return result;
}

function getTFCandles() {
    const g = TF_GROUPS[currentTF] || 1;
    return g === 1 ? processedCandles : aggregateCandles(processedCandles, g);
}

function setTF(tf) {
    if (currentTF === tf) return;
    currentTF = tf;
    document.getElementById('tfSelect').value = tf;
    updateManualLinesForTF();   // adapt lines to new TF (don't clear)
    refreshTFDisplay(true);
}

function updateManualLinesForTF() {
    const g      = TF_GROUPS[currentTF] || 1;
    const tfLen  = getTFCandles().length;
    const lineEnd = Math.max(tfLen + 500, 2500);

    manualLines.forEach(line => {
        try {
            if (line.isHorizontal) {
                line.series.setData([
                    { time: 0,       value: line.price },
                    { time: lineEnd, value: line.price },
                ]);
            } else if (line.p1 && line.p2) {
                const t1 = Math.floor(line.p1.m1Time / g);
                const t2 = Math.floor(line.p2.m1Time / g);
                if (t1 === t2) return;
                line.series.setData([
                    { time: t1, value: line.p1.price },
                    { time: t2, value: line.p2.price },
                ]);
            }
        } catch(_) {}
    });
}

function refreshTFDisplay(resetView) {
    const tfc  = getTFCandles();
    const saved = chart.timeScale().getVisibleLogicalRange();
    candleSeries.setData(tfc);
    if (resetView || !saved) {
        const from = Math.max(0, tfc.length - 120);
        chart.timeScale().setVisibleLogicalRange({ from, to: tfc.length + 10 });
    } else {
        try { chart.timeScale().setVisibleLogicalRange(saved); } catch(_) {}
        requestAnimationFrame(() => {
            try { chart.timeScale().setVisibleLogicalRange(saved); } catch(_) {}
        });
    }
    refreshHLines();
    if (autoSROn) drawAutoSR();
}

// Drawing
let tool        = 'pointer';
let manualLines = [];
let autoSRLines = [];
let autoSROn    = false;

// Drag state (shared for trend + S/R)
let drawActive   = false;
let drawP1       = null;   // {time, price}
let previewSeries = null;

// Aliases kept for cancelTrend()
let trendActive = false;
let trendP1     = null;

// Prediction
let predHistory = [];

/* ══════════════════════════════════════════
   CHART INIT
══════════════════════════════════════════ */
function initChart() {
    const wrap = document.getElementById('tvChart');

    chart = LightweightCharts.createChart(wrap, {
        localization: {
            timeFormatter: (time) => {
                const g  = TF_GROUPS[currentTF] || 1;
                const t  = indexToTime[Math.floor(time) * g];
                if (!t) return '';
                const Mo = String(t.mo).padStart(2,'0');
                const D  = String(t.d).padStart(2,'0');
                const H  = String(t.h).padStart(2,'0');
                const Mi = String(t.mi).padStart(2,'0');
                return `${t.y}-${Mo}-${D}  ${H}:${Mi} MMT`;
            },
        },
        layout: {
            background: { color: '#ffffff' },
            textColor:  '#131722',
            fontSize:   11,
        },
        grid: {
            vertLines: { color: '#f0f3fa' },
            horzLines: { color: '#f0f3fa' },
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { color: '#2962ff', width: 1, style: LightweightCharts.LineStyle.Dashed },
            horzLine: { color: '#2962ff', width: 1, style: LightweightCharts.LineStyle.Dashed },
        },
        rightPriceScale: {
            borderColor:   '#e0e3eb',
            scaleMargins:  { top: 0.06, bottom: 0.06 },
        },
        timeScale: {
            borderColor:       '#e0e3eb',
            timeVisible:       true,
            secondsVisible:    false,
            barSpacing:        6,
            minBarSpacing:     1,
            rightOffset:       12,
            fixLeftEdge:       false,
            fixRightEdge:      false,
            tickMarkFormatter: (time, tickMarkType) => {
                const g  = TF_GROUPS[currentTF] || 1;
                const t  = indexToTime[Math.floor(time) * g];
                if (!t) return '';
                const H  = String(t.h).padStart(2,'0');
                const Mi = String(t.mi).padStart(2,'0');
                const D  = String(t.d).padStart(2,'0');
                const Mo = String(t.mo).padStart(2,'0');
                if (tickMarkType === 0) return String(t.y);
                if (tickMarkType === 1) return `${t.y}.${Mo}`;
                if (tickMarkType === 2) return `${Mo}/${D}`;
                return `${H}:${Mi}`;
            },
        },
        handleScroll: { vertTouchDrag: false },
        handleScale:  { axisPressedMouseMove: true, mouseWheel: true, pinch: true },
    });

    // Resize
    const ro = new ResizeObserver(() => {
        chart.resize(wrap.clientWidth, wrap.clientHeight);
    });
    ro.observe(wrap);
    chart.resize(wrap.clientWidth, wrap.clientHeight);

    candleSeries = chart.addCandlestickSeries({
        upColor:         CFG.UP_COLOR,
        downColor:       CFG.DOWN_COLOR,
        borderUpColor:   CFG.UP_COLOR,
        borderDownColor: CFG.DOWN_COLOR,
        wickUpColor:     CFG.UP_COLOR,
        wickDownColor:   CFG.DOWN_COLOR,
    });

    setupDrawingEvents();
}

/* ══════════════════════════════════════════
   CANDLE BUILDER  (accepts pre-sorted slice)
══════════════════════════════════════════ */
function buildCandles(sortedSlice) {
    let price = 10000;
    return sortedSlice.map((game, idx) => {
        const isBig = parseInt(game.number, 10) >= 5;
        const body  = isBig ? CFG.BODY : -CFG.BODY;
        const open  = price;
        const close = price + body;
        const wick  = Math.abs(body) * CFG.WICK_R;
        price = close;
        if (game.blockTime) indexToTime[idx] = parseMMT(game.blockTime);
        return {
            time:  idx,
            open,
            high:  Math.max(open, close) + wick,
            low:   Math.min(open, close) - wick,
            close,
        };
    });
}

/* ══════════════════════════════════════════
   CHART UPDATE — gap-free + scroll-stable
   setData()  → first load only (one time)
   update()   → every new candle after that
   Chart position is NEVER reset after first load.
══════════════════════════════════════════ */
function applyUpdate(list) {
    // Sort ascending by issueNumber
    const sorted = list.slice().sort((a, b) =>
        BigInt(a.issueNumber) < BigInt(b.issueNumber) ? -1 : 1
    );

    /* ── First load: setData() once ─────── */
    if (isFirstLoad) {
        // Use last MAX_CANDLES games
        const initial = sorted.slice(-CFG.MAX_CANDLES);
        processedCandles = buildCandles(initial);
        candleSeries.setData(processedCandles);

        // Track state for future incremental updates
        if (processedCandles.length > 0) {
            lastCandlePrice = processedCandles[processedCandles.length - 1].close;
        }
        lastProcessedIssue = initial.length > 0
            ? initial[initial.length - 1].issueNumber
            : null;

        const from = Math.max(0, processedCandles.length - 120);
        chart.timeScale().setVisibleLogicalRange({ from, to: processedCandles.length + 10 });
        isFirstLoad = false;
        document.getElementById('loadingOverlay').style.display = 'none';
        return;
    }

    /* ── Incremental: append only new issues ─ */
    if (!lastProcessedIssue) return;

    const newGames = sorted.filter(g =>
        BigInt(g.issueNumber) > BigInt(lastProcessedIssue)
    );

    if (newGames.length === 0) {
        document.getElementById('loadingOverlay').style.display = 'none';
        return;
    }

    // Build & append each new candle from the running price
    let price = lastCandlePrice;
    newGames.forEach(game => {
        const isBig  = parseInt(game.number, 10) >= 5;
        const body   = isBig ? CFG.BODY : -CFG.BODY;
        const open   = price;
        const close  = price + body;
        const wick   = Math.abs(body) * CFG.WICK_R;
        const candle = {
            time:  processedCandles.length,
            open, close,
            high:  Math.max(open, close) + wick,
            low:   Math.min(open, close) - wick,
        };
        if (game.blockTime) indexToTime[candle.time] = parseMMT(game.blockTime);
        processedCandles.push(candle);
        price = close;
        // Only update chart directly for M1; M15/H1 rebuilt below
        if (currentTF === 'M1') {
            try { candleSeries.update(candle); } catch(_) {}
        }
    });

    lastCandlePrice    = price;
    lastProcessedIssue = newGames[newGames.length - 1].issueNumber;

    if (currentTF !== 'M1') {
        refreshTFDisplay(false);
    } else {
        refreshHLines();
        if (autoSROn) drawAutoSR();
    }
    document.getElementById('loadingOverlay').style.display = 'none';
}

function refreshHLines() {
    const lineEnd = processedCandles.length + 500;
    manualLines.forEach(l => {
        if (l.isHorizontal) {
            try {
                l.series.setData([
                    { time: 0,       value: l.price },
                    { time: lineEnd, value: l.price },
                ]);
            } catch(_) {}
        }
    });
}

/* ══════════════════════════════════════════
   FETCH
══════════════════════════════════════════ */
let _initialLoadDone = false;

async function fetchData() {
    try {
        if (!_initialLoadDone) {
            // ── Phase 1: quick load (1200 candles) — chart shows fast ──────
            const quickRes = await fetch('/api/trx-data?limit=1200&t=' + Date.now());
            if (quickRes.ok) {
                const quickList = await quickRes.json();
                if (Array.isArray(quickList) && quickList.length > 0) {
                    applyUpdate(quickList);
                    updateHeader(quickList);
                    updatePrediction(quickList);
                }
            }
            // ── Phase 2: full 10k load in background ─────────────────────
            _initialLoadDone = true;
            setTimeout(async () => {
                try {
                    const fullRes = await fetch('/api/trx-data?t=' + Date.now());
                    if (!fullRes.ok) return;
                    const fullList = await fullRes.json();
                    if (Array.isArray(fullList) && fullList.length > 0) {
                        applyUpdate(fullList);
                        updateHeader(fullList);
                        updatePrediction(fullList);
                    }
                } catch(e) { console.warn('[TRX full load]', e); }
            }, 500);
        } else {
            // ── Regular interval fetch: full data ────────────────────────
            const res  = await fetch('/api/trx-data?t=' + Date.now());
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const list = await res.json();
            if (!Array.isArray(list) || list.length === 0) return;
            applyUpdate(list);
            updateHeader(list);
            updatePrediction(list);
        }
    } catch (err) {
        console.error('[TRX]', err);
    }
}

function updateHeader(list) {
    const sorted = list.slice().sort((a, b) =>
        BigInt(b.issueNumber) > BigInt(a.issueNumber) ? 1 : -1
    );
    const latest    = sorted[0];
    const nextIssue = (BigInt(latest.issueNumber) + 1n).toString();
    document.getElementById('hCurrent').textContent = latest.issueNumber.toString().slice(-6);
    document.getElementById('hNext').textContent    = nextIssue.slice(-6);
    document.getElementById('hUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

/* ══════════════════════════════════════════
   COORDINATE HELPERS
══════════════════════════════════════════ */
function getChartXY(e) {
    const rect = document.getElementById('tvChart').getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function xyToChartPoint(x, y) {
    try {
        const time  = chart.timeScale().coordinateToLogical(x);
        const price = candleSeries.coordinateToPrice(y);
        if (time == null || price == null) return null;
        return { time: Math.round(time), price };
    } catch (_) { return null; }
}

/* ══════════════════════════════════════════
   DRAWING TOOLS
══════════════════════════════════════════ */
function setTool(t) {
    if (trendActive) cancelTrend();
    tool = t;

    // Update button states
    ['btnPointer','btnCrosshair','btnTrend','btnSupport','btnResistance','btnRect','btnErase'].forEach(id => {
        const el = document.getElementById(id);
        if (el && id !== 'btnCrosshair') el.classList.remove('active');
    });
    const map = { pointer:'btnPointer', trend:'btnTrend', support:'btnSupport', resistance:'btnResistance', rect:'btnRect', erase:'btnErase' };
    if (map[t]) document.getElementById(map[t]).classList.add('active');

    // Cursor
    document.getElementById('tvChart').style.cursor = t === 'pointer' ? 'default' : 'crosshair';

    // Disable chart scroll/pan for ALL drawing tools (pointer only = scroll enabled)
    chart.applyOptions({
        handleScroll: {
            pressedMouseMove: t === 'pointer',
            horzTouchDrag:    t === 'pointer',
            vertTouchDrag:    false,
        },
        handleScale: {
            axisPressedMouseMove: t === 'pointer',
            mouseWheel: true,
            pinch: true,
        },
    });
}

function setupDrawingEvents() {
    const el = document.getElementById('tvChart');

    /* ── MOUSE DOWN ─────────────────────────────── */
    el.addEventListener('mousedown', e => {
        if (tool === 'pointer') return;
        e.preventDefault();
        e.stopPropagation();

        const { x, y } = getChartXY(e);

        // Erase: find and remove nearest line on click
        if (tool === 'erase') { eraseNearestLine(x, y); return; }

        const pt = xyToChartPoint(x, y);
        if (!pt) return;

        drawActive = true;
        drawP1 = pt;

        // Rect preview via shimmer canvas
        if (tool === 'rect') {
            previewRect = { x1: x, y1: y, x2: x, y2: y };
            return;
        }

        if (tool === 'trend') {
            previewSeries = chart.addLineSeries({
                color: '#2962ff', lineWidth: 1,
                lastValueVisible: false, priceLineVisible: false,
                lineStyle: LightweightCharts.LineStyle.Dashed,
            });
            previewSeries.setData([
                { time: pt.time,     value: pt.price },
                { time: pt.time + 1, value: pt.price },
            ]);
        } else if (tool === 'support' || tool === 'resistance') {
            const color = tool === 'support' ? CFG.UP_COLOR : CFG.DOWN_COLOR;
            const lineEnd = Math.max(processedCandles.length + 500, 2500);
            previewSeries = chart.addLineSeries({
                color, lineWidth: 1,
                lastValueVisible: false, priceLineVisible: false,
                lineStyle: LightweightCharts.LineStyle.Dashed,
            });
            previewSeries.setData([
                { time: 0,       value: pt.price },
                { time: lineEnd, value: pt.price },
            ]);
        }
    }, { capture: true });

    /* ── MOUSE MOVE ─────────────────────────────── */
    el.addEventListener('mousemove', e => {
        if (!drawActive || !drawP1) return;

        const { x, y } = getChartXY(e);

        // Rect: update preview via shimmer canvas
        if (tool === 'rect' && previewRect) {
            e.preventDefault();
            previewRect.x2 = x; previewRect.y2 = y;
            return;
        }

        if (!previewSeries) return;
        e.preventDefault();
        const pt = xyToChartPoint(x, y);
        if (!pt) return;

        if (tool === 'trend') {
            if (pt.time !== drawP1.time) updatePreview(drawP1, pt);
        } else if (tool === 'support' || tool === 'resistance') {
            // Follow Y only (horizontal line)
            const lineEnd = Math.max(processedCandles.length + 500, 2500);
            try {
                previewSeries.setData([
                    { time: 0,       value: pt.price },
                    { time: lineEnd, value: pt.price },
                ]);
            } catch(_) {}
        }
    }, { capture: true });

    /* ── MOUSE UP ───────────────────────────────── */
    el.addEventListener('mouseup', e => {
        if (!drawActive || !drawP1) return;
        e.preventDefault();

        const { x, y } = getChartXY(e);
        const pt = xyToChartPoint(x, y);

        // Finalize rectangle
        if (tool === 'rect' && previewRect) {
            if (Math.abs(previewRect.x2-previewRect.x1) > 5 && Math.abs(previewRect.y2-previewRect.y1) > 5) {
                if (pt) finalizeRect(drawP1, pt);
            }
            previewRect = null;
            drawActive = false; drawP1 = null;
            return;
        }

        if (previewSeries) {
            try { chart.removeSeries(previewSeries); } catch(_) {}
            previewSeries = null;
        }

        if (pt) {
            if (tool === 'trend' && pt.time !== drawP1.time) {
                finalizeTrend(drawP1, pt);
            } else if (tool === 'support') {
                addHLine(pt.price, CFG.UP_COLOR, 'support');
            } else if (tool === 'resistance') {
                addHLine(pt.price, CFG.DOWN_COLOR, 'resistance');
            }
        }

        drawActive = false;
        drawP1 = null;
    }, { capture: true });

    /* ── TOUCH START ────────────────────────────── */
    el.addEventListener('touchstart', e => {
        if (tool === 'pointer') {
            if (crosshairOn && e.touches.length === 1) {
                const { x, y } = getChartXY(e);
                const time  = chart.timeScale().coordinateToLogical(x);
                const price = candleSeries.coordinateToPrice(y);
                if (time != null && price != null)
                    try { chart.setCrosshairPosition(price, Math.round(time), candleSeries); } catch(_) {}
            }
            return;
        }
        e.preventDefault();
        const { x, y } = getChartXY(e);

        // Erase on touch
        if (tool === 'erase') { eraseNearestLine(x, y); return; }

        const pt = xyToChartPoint(x, y);
        if (!pt) return;
        drawActive = true; drawP1 = pt;

        if (tool === 'rect') {
            previewRect = { x1: x, y1: y, x2: x, y2: y };
        } else if (tool === 'trend') {
            previewSeries = chart.addLineSeries({ color:'#2962ff', lineWidth:1,
                lastValueVisible:false, priceLineVisible:false,
                lineStyle: LightweightCharts.LineStyle.Dashed });
            previewSeries.setData([{time:pt.time,value:pt.price},{time:pt.time+1,value:pt.price}]);
        } else if (tool === 'support' || tool === 'resistance') {
            const color = tool==='support' ? CFG.UP_COLOR : CFG.DOWN_COLOR;
            const lineEnd = Math.max(processedCandles.length+500, 2500);
            previewSeries = chart.addLineSeries({ color, lineWidth:1,
                lastValueVisible:false, priceLineVisible:false,
                lineStyle: LightweightCharts.LineStyle.Dashed });
            previewSeries.setData([{time:0,value:pt.price},{time:lineEnd,value:pt.price}]);
        }
    }, { passive: false });

    /* ── TOUCH MOVE ─────────────────────────────── */
    el.addEventListener('touchmove', e => {
        if (tool === 'pointer') {
            if (crosshairOn && e.touches.length === 1) {
                e.preventDefault();
                const { x, y } = getChartXY(e);
                const time  = chart.timeScale().coordinateToLogical(x);
                const price = candleSeries.coordinateToPrice(y);
                if (time != null && price != null)
                    try { chart.setCrosshairPosition(price, Math.round(time), candleSeries); } catch(_) {}
            }
            return;
        }
        if (!drawActive || !drawP1) return;
        e.preventDefault();
        const { x, y } = getChartXY(e);

        // Rect preview on touch drag
        if (tool === 'rect' && previewRect) {
            previewRect.x2 = x; previewRect.y2 = y; return;
        }
        if (!previewSeries) return;
        const pt = xyToChartPoint(x, y);
        if (!pt) return;
        if (tool === 'trend') {
            if (pt.time !== drawP1.time) updatePreview(drawP1, pt);
        } else if (tool === 'support' || tool === 'resistance') {
            const lineEnd = Math.max(processedCandles.length+500, 2500);
            try { previewSeries.setData([{time:0,value:pt.price},{time:lineEnd,value:pt.price}]); } catch(_) {}
        }
    }, { passive: false });

    /* ── TOUCH END ──────────────────────────────── */
    el.addEventListener('touchend', e => {
        if (tool === 'pointer') {
            try { chart.clearCrosshairPosition(); } catch(_) {}
            return;
        }
        if (!drawActive || !drawP1) return;
        e.preventDefault();

        const touch = e.changedTouches && e.changedTouches[0];
        const ex = touch ? touch.clientX - el.getBoundingClientRect().left : 0;
        const ey = touch ? touch.clientY - el.getBoundingClientRect().top  : 0;
        const pt = xyToChartPoint(ex, ey);

        // Finalize rect
        if (tool === 'rect' && previewRect) {
            if (Math.abs(ex - (drawP1 ? previewRect.x1 : ex)) > 5 || true) {
                if (pt) finalizeRect(drawP1, pt);
            }
            previewRect = null; drawActive = false; drawP1 = null; return;
        }

        if (previewSeries) { try { chart.removeSeries(previewSeries); } catch(_) {} previewSeries = null; }
        if (pt) {
            if (tool === 'trend' && pt.time !== drawP1.time) finalizeTrend(drawP1, pt);
            else if (tool === 'support')    addHLine(pt.price, CFG.UP_COLOR,   'support');
            else if (tool === 'resistance') addHLine(pt.price, CFG.DOWN_COLOR, 'resistance');
        }
        drawActive = false; drawP1 = null;
    }, { passive: false });
}

function updatePreview(p1, p2) {
    if (!previewSeries) return;
    const [a, b] = p1.time < p2.time ? [p1, p2] : [p2, p1];
    try {
        previewSeries.setData([
            { time: a.time, value: a.price },
            { time: b.time, value: b.price },
        ]);
    } catch (_) {}
}

function finalizeRect(p1, p2) {
    const g  = TF_GROUPS[currentTF] || 1;
    const a0 = { m1Time: Math.min(p1.time, p2.time) * g, price: (p1.time < p2.time ? p1 : p2).price };
    const b0 = { m1Time: Math.max(p1.time, p2.time) * g, price: (p1.time > p2.time ? p1 : p2).price };
    manualLines.push({ series: null, isHorizontal: false, type: 'rect', p1: a0, p2: b0 });
}

function finalizeTrend(p1, p2) {
    const g  = TF_GROUPS[currentTF] || 1;
    // Convert TF-time → M1 canonical time
    const a0 = { m1Time: Math.min(p1.time, p2.time) * g, price: (p1.time < p2.time ? p1 : p2).price };
    const b0 = { m1Time: Math.max(p1.time, p2.time) * g, price: (p1.time > p2.time ? p1 : p2).price };
    if (a0.m1Time === b0.m1Time) return;

    const s = chart.addLineSeries({
        color: '#2962ff', lineWidth: 2,
        lastValueVisible: false, priceLineVisible: false,
        lineStyle: LightweightCharts.LineStyle.Solid,
    });
    s.setData([
        { time: Math.floor(a0.m1Time / g), value: a0.price },
        { time: Math.floor(b0.m1Time / g), value: b0.price },
    ]);
    manualLines.push({ series: s, isHorizontal: false, type: 'trend', p1: a0, p2: b0 });
}

function cancelTrend() {
    drawActive = false;
    drawP1 = null;
    trendActive = false;
    trendP1 = null;
    if (previewSeries) { try { chart.removeSeries(previewSeries); } catch(_) {} previewSeries = null; }
}

function addHLine(price, color, type) {
    const lineEnd = Math.max(processedCandles.length + 500, 2500);
    const s = chart.addLineSeries({
        color, lineWidth: 2,
        lastValueVisible: false, priceLineVisible: false,
        lineStyle: LightweightCharts.LineStyle.Solid,
    });
    s.setData([
        { time: 0,       value: price },
        { time: lineEnd, value: price },
    ]);
    manualLines.push({ series: s, isHorizontal: true, price, type });
}

function clearAllDrawings() {
    cancelTrend();
    manualLines.forEach(l => { if (l.series) try { chart.removeSeries(l.series); } catch(_) {} });
    manualLines = [];
    setTool('pointer');
}

/* ══════════════════════════════════════════
   AUTO S/R
══════════════════════════════════════════ */
function toggleAutoSR() {
    autoSROn = !autoSROn;
    document.getElementById('btnAutoSR').classList.toggle('active', autoSROn);
    autoSROn ? drawAutoSR() : clearAutoSR();
}

function clearAutoSR() {
    autoSRLines.forEach(s => { try { chart.removeSeries(s); } catch(_) {} });
    autoSRLines = [];
}

function drawAutoSR() {
    clearAutoSR();
    const tfc = getTFCandles();
    if (tfc.length < 10) return;

    const candles  = tfc.slice(-50);
    const lb       = 2;   // lookback each side
    const swHigh   = [];
    const swLow    = [];

    for (let i = lb; i < candles.length - lb; i++) {
        let isH = true, isL = true;
        for (let j = i - lb; j <= i + lb; j++) {
            if (j === i) continue;
            if (candles[j].high >= candles[i].high) isH = false;
            if (candles[j].low  <= candles[i].low)  isL = false;
        }
        if (isH) swHigh.push(candles[i].high);
        if (isL) swLow.push(candles[i].low);
    }

    // Fallback: use sorted extreme values if swings are few
    const rPrices = swHigh.length >= 2 ? swHigh
        : candles.map(c => c.high).sort((a, b) => b - a).slice(0, 6);
    const sPrices = swLow.length >= 2  ? swLow
        : candles.map(c => c.low).sort((a, b) => a - b).slice(0, 6);

    const rLevels = clusterPrices(rPrices, 0.04).sort((a, b) => b.n - a.n).slice(0, 3);
    const sLevels = clusterPrices(sPrices, 0.04).sort((a, b) => b.n - a.n).slice(0, 3);

    const lineEnd = getTFCandles().length + 500;

    const drawLevel = (price, color, n) => {
        const s = chart.addLineSeries({
            color, lineWidth: n >= 3 ? 3 : 2,
            lastValueVisible: false, priceLineVisible: false,
            lineStyle: LightweightCharts.LineStyle.Dashed,
        });
        s.setData([
            { time: 0,       value: price },
            { time: lineEnd, value: price },
        ]);
        autoSRLines.push(s);
    };

    rLevels.forEach(l => drawLevel(l.p, CFG.DOWN_COLOR, l.n));
    sLevels.forEach(l => drawLevel(l.p, CFG.UP_COLOR,   l.n));
}

function clusterPrices(prices, tol) {
    const groups = [];
    prices.forEach(p => {
        const g = groups.find(g => Math.abs(g.p - p) <= tol);
        if (g) { g.n++; g.p = (g.p * (g.n - 1) + p) / g.n; }
        else groups.push({ p, n: 1 });
    });
    return groups;
}

/* ══════════════════════════════════════════
   PREDICTION  — Professional TA Engine
   Methods: S/R · Trend Breakout · Flag Pattern
   Vote system: each method casts weighted vote
══════════════════════════════════════════ */

/* ── TA Helper: find swing S/R levels ── */
function findSRLevels(candles, lookback) {
    const levels = [];
    for (let i = lookback; i < candles.length - lookback; i++) {
        const c = candles[i];
        let isSwingH = true, isSwingL = true;
        for (let j = 1; j <= lookback; j++) {
            if (candles[i-j].high >= c.high || candles[i+j].high >= c.high) isSwingH = false;
            if (candles[i-j].low  <= c.low  || candles[i+j].low  <= c.low)  isSwingL = false;
        }
        if (isSwingH) levels.push({ price: c.high, type: 'R' });
        if (isSwingL) levels.push({ price: c.low,  type: 'S' });
    }
    return levels;
}

/* ── TA Method 1: Support & Resistance ── */
function srSignal(candles) {
    if (candles.length < 20) return { vote: 0, note: '' };
    const recent  = candles.slice(-30);
    const levels  = findSRLevels(candles.slice(-60), 3);
    const last    = candles[candles.length - 1];
    const price   = last.close;
    const range   = Math.abs(last.high - last.low) * 3;

    let nearR = levels.filter(l => l.type === 'R' && Math.abs(l.price - price) < range);
    let nearS = levels.filter(l => l.type === 'S' && Math.abs(l.price - price) < range);

    // Breakout check: price closed above resistance → BIG
    let brokeR = levels.filter(l => l.type === 'R' && last.open < l.price && last.close > l.price);
    let brokeS = levels.filter(l => l.type === 'S' && last.open > l.price && last.close < l.price);

    if (brokeR.length) return { vote: +2, note: 'R Breakout ↑' };
    if (brokeS.length) return { vote: -2, note: 'S Breakdown ↓' };
    if (nearR.length)  return { vote: -1, note: 'Near Resistance' };
    if (nearS.length)  return { vote: +1, note: 'Near Support' };
    return { vote: 0, note: '' };
}

/* ── TA Method 2: Trend Line Breakout ── */
function trendBreakoutSignal(candles) {
    if (candles.length < 15) return { vote: 0, note: '' };
    const n   = 15;
    const seg = candles.slice(-n);

    // Linear regression on close prices
    let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
    seg.forEach((c, i) => { sumX += i; sumY += c.close; sumXY += i * c.close; sumX2 += i * i; });
    const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);

    // Momentum: last 3 candles direction
    const last3 = candles.slice(-3);
    const bullMomentum = last3.every(c => c.close > c.open);
    const bearMomentum = last3.every(c => c.close < c.open);

    // Last candle vs trend direction
    const last = candles[candles.length - 1];
    const candleIsBull = last.close > last.open;
    const candleIsBear = last.close < last.open;

    // Breakout: trend was down but last candle is strongly bullish
    if (slope < 0 && candleIsBull && bullMomentum) return { vote: +2, note: 'Downtrend Breakout ↑' };
    // Breakout: trend was up but last candle is strongly bearish
    if (slope > 0 && candleIsBear && bearMomentum) return { vote: -2, note: 'Uptrend Breakout ↓' };
    // Trend continuation
    if (slope > 0 && candleIsBull) return { vote: +1, note: 'Uptrend Cont.' };
    if (slope < 0 && candleIsBear) return { vote: -1, note: 'Downtrend Cont.' };
    return { vote: 0, note: '' };
}

/* ── TA Method 3: Flag Pattern ── */
function flagPatternSignal(candles) {
    if (candles.length < 12) return { vote: 0, note: '' };
    const pole  = candles.slice(-12, -5);   // flagpole (7 candles)
    const flag  = candles.slice(-5);         // flag consolidation (5 candles)

    // Pole direction: count bull vs bear
    const poleBull = pole.filter(c => c.close > c.open).length;
    const poleBear = pole.filter(c => c.close < c.open).length;
    const poleIsBull = poleBull > poleBear;
    const poleIsBear = poleBear > poleBull;

    // Flag: slight counter-move (at least 2 opposite candles)
    const flagBull = flag.filter(c => c.close > c.open).length;
    const flagBear = flag.filter(c => c.close < c.open).length;
    const flagCounter = poleIsBull ? flagBear >= 2 : flagBull >= 2;

    // Last candle breaks flag in pole direction
    const last = candles[candles.length - 1];

    if (poleIsBull && flagCounter && last.close > last.open) {
        return { vote: +2, note: 'Bull Flag Breakout ↑' };
    }
    if (poleIsBear && flagCounter && last.close < last.open) {
        return { vote: -2, note: 'Bear Flag Breakout ↓' };
    }
    // Flag forming (consolidation phase)
    if (poleIsBull && flagCounter) return { vote: +1, note: 'Bull Flag Forming' };
    if (poleIsBear && flagCounter) return { vote: -1, note: 'Bear Flag Forming' };
    return { vote: 0, note: '' };
}

function updatePrediction(list) {
    if (list.length < 15) return;

    const sorted = list.slice().sort((a, b) =>
        BigInt(b.issueNumber) > BigInt(a.issueNumber) ? 1 : -1
    );
    const next = (BigInt(sorted[0].issueNumber) + 1n).toString();

    // Use M1 processedCandles for TA (always, regardless of display TF)
    const candles = processedCandles;
    if (candles.length < 15) return;

    // ── Run all 3 TA methods ──────────────
    const sr   = srSignal(candles);
    const tb   = trendBreakoutSignal(candles);
    const flag = flagPatternSignal(candles);

    // ── Weighted vote system ─────────────
    // Weights: S/R=3, Trend Breakout=3, Flag=4 (flag is most pattern-based)
    const totalVote = sr.vote * 3 + tb.vote * 3 + flag.vote * 4;
    const maxVote   = 3 * 2 + 3 * 2 + 4 * 2;  // = 20

    const pred = totalVote > 0 ? 'BIG' : totalVote < 0 ? 'SMALL' : (Math.random() > 0.5 ? 'BIG' : 'SMALL');
    const conf = Math.min(Math.round(50 + (Math.abs(totalVote) / maxVote) * 45), 95);

    // Build note from active signals
    const notes = [sr.note, tb.note, flag.note].filter(n => n);
    const note  = notes.length ? notes.join(' · ') : 'Signals Conflicting';

    // Check past predictions
    sorted.forEach(game => {
        const actual = parseInt(game.number, 10) >= 5 ? 'BIG' : 'SMALL';
        predHistory.forEach(p => {
            if (p.issue === game.issueNumber && p.status === 'pending') {
                p.status = p.pred === actual ? 'correct' : 'wrong';
            }
        });
    });

    if (!predHistory.find(p => p.issue === next)) {
        predHistory.unshift({ issue: next, pred, conf: Math.round(conf), note, status: 'pending' });
        if (predHistory.length > 60) predHistory.pop();
    }

    // Render
    const el = document.getElementById('pResult');
    el.textContent = pred || 'WAIT';
    el.className   = 'pred-badge ' + (pred ? pred.toLowerCase() : 'wait');
    document.getElementById('pIssue').textContent   = next.slice(-6);
    document.getElementById('pConfTxt').textContent = conf ? Math.round(conf) + '%' : '—';
    document.getElementById('pNote').textContent    = note || '—';

    // TA signal mini-badges
    function voteBadge(vote, noteText) {
        const txt   = vote > 0 ? '▲ BIG' : vote < 0 ? '▼ SMALL' : '◆ NEUTRAL';
        const color = vote > 0 ? '#26a69a' : vote < 0 ? '#ef5350' : '#adb0bc';
        return `<span style="color:${color}">${txt}</span>`;
    }
    document.getElementById('taSR').innerHTML   = voteBadge(sr.vote,   sr.note);
    document.getElementById('taTB').innerHTML   = voteBadge(tb.vote,   tb.note);
    document.getElementById('taFLAG').innerHTML = voteBadge(flag.vote, flag.note);

    const bar = document.getElementById('pConfBar');
    bar.style.width = (conf || 0) + '%';
    bar.className   = 'conf-bar ' + (conf >= 70 ? 'high' : conf >= 50 ? 'medium' : 'low');

    renderHistory();
}

function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    predHistory.forEach(p => {
        const div = document.createElement('div');
        div.className = 'h-row';
        const icon  = p.status === 'correct' ? '✓' : p.status === 'wrong' ? '✗' : '⏳';
        const color = p.status === 'correct' ? '#26a69a' : p.status === 'wrong' ? '#ef5350' : '#adb0bc';
        div.innerHTML = `
            <span class="h-issue">${p.issue.toString().slice(-6)}</span>
            <span class="h-pred ${p.pred.toLowerCase()}">${p.pred}</span>
            <span class="h-icon" style="color:${color}">${icon}</span>
        `;
        list.appendChild(div);
    });
    const checked = predHistory.filter(p => p.status !== 'pending');
    const correct = checked.filter(p => p.status === 'correct');
    document.getElementById('sTotal').textContent   = checked.length;
    document.getElementById('sCorrect').textContent = correct.length;
    document.getElementById('sAccuracy').textContent =
        checked.length ? Math.round(correct.length / checked.length * 100) + '%' : '—';
}

/* ══════════════════════════════════════════
   SHIMMER EFFECT (canvas overlay)
══════════════════════════════════════════ */
let shimCtx    = null;
let shimCanvas = null;
let shimTime   = 0;   // ever-increasing counter for ping-pong

function pingpong(t, mn, mx) {
    const range = mx - mn;
    if (range <= 0) return mn;
    const cycle = t % (2 * range);
    return mn + (cycle < range ? cycle : 2 * range - cycle);
}

function initShimmer() {
    const wrap = document.querySelector('.chart-wrap');
    shimCanvas = document.createElement('canvas');
    shimCanvas.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:6;';
    shimCanvas.width  = wrap.clientWidth;
    shimCanvas.height = wrap.clientHeight;
    wrap.appendChild(shimCanvas);
    shimCtx = shimCanvas.getContext('2d');

    const ro = new ResizeObserver(() => {
        shimCanvas.width  = wrap.clientWidth;
        shimCanvas.height = wrap.clientHeight;
    });
    ro.observe(wrap);

    shimmerLoop();
}

function shimmerLoop() {
    requestAnimationFrame(shimmerLoop);
    if (!shimCtx) return;
    shimCtx.clearRect(0, 0, shimCanvas.width, shimCanvas.height);

    shimTime += 1.8;
    drawLastCandleDot();

    // Draw preview rectangle during drag
    if (previewRect) {
        shimCtx.save();
        shimCtx.strokeStyle = 'rgba(41,98,255,0.75)';
        shimCtx.lineWidth = 1.5;
        shimCtx.setLineDash([5, 3]);
        const rx = Math.min(previewRect.x1, previewRect.x2);
        const ry = Math.min(previewRect.y1, previewRect.y2);
        const rw = Math.abs(previewRect.x2 - previewRect.x1);
        const rh = Math.abs(previewRect.y2 - previewRect.y1);
        shimCtx.strokeRect(rx, ry, rw, rh);
        shimCtx.fillStyle = 'rgba(41,98,255,0.05)';
        shimCtx.fillRect(rx, ry, rw, rh);
        shimCtx.restore();
    }

    if (manualLines.length > 0) manualLines.forEach(line => drawShimmer(line));
}

function drawLastCandleDot() {
    const tfc = getTFCandles();
    if (!tfc || tfc.length === 0) return;
    const last    = tfc[tfc.length - 1];
    const isGreen = last.close > last.open;

    // Green → dot at high (top); Red → dot at low (bottom)
    const dotPrice = isGreen ? last.high : last.low;
    const color    = isGreen ? '#26a69a' : '#ef5350';
    const glow     = isGreen ? '#aef5ee' : '#ffb3b1';

    try {
        const x = chart.timeScale().logicalToCoordinate(last.time);
        const y = candleSeries.priceToCoordinate(dotPrice);
        if (x == null || y == null) return;

        // Pulse: 0.3 → 1.0 sine wave
        const pulse = Math.sin(shimTime * 0.07) * 0.35 + 0.65;
        const r     = 4 * pulse;

        // Outer halo
        const halo = shimCtx.createRadialGradient(x, y, 0, x, y, r * 3);
        halo.addColorStop(0,   hexAlpha(glow,  0.7 * pulse));
        halo.addColorStop(0.5, hexAlpha(color, 0.3 * pulse));
        halo.addColorStop(1,   'rgba(0,0,0,0)');

        shimCtx.save();
        shimCtx.fillStyle = halo;
        shimCtx.beginPath();
        shimCtx.arc(x, y, r * 3, 0, Math.PI * 2);
        shimCtx.fill();

        // Core bright dot
        shimCtx.shadowColor = glow;
        shimCtx.shadowBlur  = 7;
        shimCtx.fillStyle   = glow;
        shimCtx.beginPath();
        shimCtx.arc(x, y, r, 0, Math.PI * 2);
        shimCtx.fill();
        shimCtx.restore();
    } catch(_) {}
}

function getCoord(line) {
    try {
        if (line.isHorizontal) {
            const y = line.series.priceToCoordinate(line.price);
            if (y == null) return null;
            const x1 = 0;
            const x2 = shimCanvas.width;
            return { x1, y1: y, x2, y2: y, isH: true };
        } else if (line.p1 && line.p2) {
            const g   = TF_GROUPS[currentTF] || 1;
            const tx1 = chart.timeScale().logicalToCoordinate(Math.floor(line.p1.m1Time / g));
            const tx2 = chart.timeScale().logicalToCoordinate(Math.floor(line.p2.m1Time / g));
            const ty1 = candleSeries.priceToCoordinate(line.p1.price);
            const ty2 = candleSeries.priceToCoordinate(line.p2.price);
            if (tx1 == null || tx2 == null || ty1 == null || ty2 == null) return null;
            return { x1: tx1, y1: ty1, x2: tx2, y2: ty2, isH: false };
        }
    } catch(_) {}
    return null;
}

function lineColor(type) {
    if (type === 'support')    return { base: '#26a69a', light: '#aef5ee' };
    if (type === 'resistance') return { base: '#ef5350', light: '#ffb3b1' };
    return { base: '#2962ff', light: '#aac4ff' };
}

function drawShimmer(line) {
    const c = getCoord(line);
    if (!c) return;

    const col  = lineColor(line.type);
    const size = 120;

    if (c.isH) {
        // Right boundary = x coordinate of the LAST CANDLE
        const lastIdx  = Math.max(getTFCandles().length - 1, 0);
        const lastX    = chart.timeScale().logicalToCoordinate(lastIdx);
        const plotRight = (lastX != null && lastX > 0 && lastX < shimCanvas.width)
            ? lastX
            : shimCanvas.width * 0.85;   // safe fallback

        const minX = size / 2;
        const maxX = plotRight - size / 2;
        if (maxX <= minX) return;

        const cx = pingpong(shimTime, minX, maxX);
        const bx = cx - size / 2;

        const grad = shimCtx.createLinearGradient(bx, 0, bx + size, 0);
        grad.addColorStop(0,    'rgba(255,255,255,0)');
        grad.addColorStop(0.3,  hexAlpha(col.light, 0.55));
        grad.addColorStop(0.5,  hexAlpha(col.light, 0.9));
        grad.addColorStop(0.7,  hexAlpha(col.light, 0.55));
        grad.addColorStop(1,    'rgba(255,255,255,0)');

        shimCtx.save();
        shimCtx.beginPath();
        shimCtx.rect(0, 0, plotRight, shimCanvas.height);
        shimCtx.clip();
        shimCtx.strokeStyle = grad;
        shimCtx.lineWidth   = 3;
        shimCtx.shadowColor = col.light;
        shimCtx.shadowBlur  = 6;
        shimCtx.beginPath();
        shimCtx.moveTo(bx, c.y1);
        shimCtx.lineTo(bx + size, c.y1);
        shimCtx.stroke();
        shimCtx.restore();

    } else if (line.type === 'rect' && line.p1 && line.p2) {
        // Rectangle — draw directly without shimmer
        try {
            const g  = TF_GROUPS[currentTF] || 1;
            const x1 = chart.timeScale().logicalToCoordinate(Math.floor(line.p1.m1Time/g));
            const x2 = chart.timeScale().logicalToCoordinate(Math.floor(line.p2.m1Time/g));
            const y1 = candleSeries.priceToCoordinate(line.p1.price);
            const y2 = candleSeries.priceToCoordinate(line.p2.price);
            if (x1==null||x2==null||y1==null||y2==null) return;
            shimCtx.save();
            shimCtx.strokeStyle = 'rgba(41,98,255,0.8)';
            shimCtx.lineWidth = 1.5;
            shimCtx.setLineDash([4,3]);
            shimCtx.strokeRect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1));
            shimCtx.fillStyle = 'rgba(41,98,255,0.04)';
            shimCtx.fillRect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1));
            shimCtx.restore();
        } catch(_) {}

    } else if (line.p1 && line.p2) {
        // Trend line: ping-pong along diagonal
        const dx  = c.x2 - c.x1;
        const dy  = c.y2 - c.y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < size) return;

        const ux = dx / len;
        const uy = dy / len;

        const minT = size / 2;
        const maxT = len - size / 2;

        const travel = pingpong(shimTime, minT, maxT);
        const cx = c.x1 + ux * travel;
        const cy = c.y1 + uy * travel;

        const sx1 = cx - ux * size / 2;
        const sy1 = cy - uy * size / 2;
        const sx2 = cx + ux * size / 2;
        const sy2 = cy + uy * size / 2;

        const grad = shimCtx.createLinearGradient(sx1, sy1, sx2, sy2);
        grad.addColorStop(0,   'rgba(255,255,255,0)');
        grad.addColorStop(0.5, hexAlpha(col.light, 0.9));
        grad.addColorStop(1,   'rgba(255,255,255,0)');

        shimCtx.save();
        shimCtx.strokeStyle = grad;
        shimCtx.lineWidth   = 3;
        shimCtx.shadowColor = col.light;
        shimCtx.shadowBlur  = 6;
        shimCtx.beginPath();
        shimCtx.moveTo(sx1, sy1);
        shimCtx.lineTo(sx2, sy2);
        shimCtx.stroke();
        shimCtx.restore();
    }
}

function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${a})`;
}

/* ══════════════════════════════════════════
   FIRE & SPARKS — CYB3R R00T
══════════════════════════════════════════ */
(function initFire() {
    const canvas = document.getElementById('fireCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const particles = [];

    class P {
        constructor() { this.reset(); }
        reset() {
            this.x  = W/2 + (Math.random()-0.5)*W*0.8;
            this.y  = H - 2;
            this.vx = (Math.random()-0.5)*1.2;
            this.vy = -(Math.random()*1.8+0.4);
            this.life = Math.random()*35+15;
            this.maxL = this.life;
            this.r = Math.random()*2.5+0.5;
            this.spark = Math.random()<0.3;
        }
        step() {
            this.x += this.vx; this.y += this.vy;
            if (this.spark) { this.vy += 0.06; this.vx += (Math.random()-0.5)*0.2; }
            return --this.life > 0;
        }
        draw() {
            const t = this.life/this.maxL;
            if (this.spark) {
                ctx.fillStyle = `rgba(255,${Math.floor(200+t*55)},30,${t})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r*0.6, 0, 6.28); ctx.fill();
            } else {
                ctx.fillStyle = `rgba(255,${Math.floor(t*160)},0,${t*0.75})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, 6.28); ctx.fill();
            }
        }
    }

    function loop() {
        requestAnimationFrame(loop);
        ctx.clearRect(0, 0, W, H);
        if (Math.random()<0.5) particles.push(new P());
        for (let i=particles.length-1; i>=0; i--) {
            if (!particles[i].step()) { particles.splice(i,1); continue; }
            particles[i].draw();
        }
    }
    loop();
})();

/* ══════════════════════════════════════════
   ERASE / RECT HELPERS
══════════════════════════════════════════ */
let previewRect = null;  // {x1,y1,x2,y2} screen coords during drag

function distToSegment(px, py, ax, ay, bx, by) {
    const dx = bx-ax, dy = by-ay, lenSq = dx*dx+dy*dy;
    if (!lenSq) return Math.hypot(px-ax, py-ay);
    const t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/lenSq));
    return Math.hypot(px-ax-t*dx, py-ay-t*dy);
}

function eraseNearestLine(x, y) {
    const g = TF_GROUPS[currentTF] || 1;
    let best = 10, idx = -1;
    manualLines.forEach((line, i) => {
        let d = Infinity;
        try {
            if (line.isHorizontal) {
                const ly = line.series.priceToCoordinate(line.price);
                if (ly != null) d = Math.abs(y - ly);
            } else if (line.type === 'rect') {
                const lx1 = chart.timeScale().logicalToCoordinate(Math.floor(line.p1.m1Time/g));
                const lx2 = chart.timeScale().logicalToCoordinate(Math.floor(line.p2.m1Time/g));
                const ly1 = candleSeries.priceToCoordinate(line.p1.price);
                const ly2 = candleSeries.priceToCoordinate(line.p2.price);
                if (lx1&&lx2&&ly1&&ly2) {
                    d = Math.min(Math.abs(y-ly1),Math.abs(y-ly2),Math.abs(x-lx1),Math.abs(x-lx2));
                }
            } else if (line.p1 && line.p2) {
                const lx1 = chart.timeScale().logicalToCoordinate(Math.floor(line.p1.m1Time/g))||0;
                const lx2 = chart.timeScale().logicalToCoordinate(Math.floor(line.p2.m1Time/g))||0;
                const ly1 = candleSeries.priceToCoordinate(line.p1.price)||0;
                const ly2 = candleSeries.priceToCoordinate(line.p2.price)||0;
                d = distToSegment(x, y, lx1, ly1, lx2, ly2);
            }
        } catch(_) {}
        if (d < best) { best = d; idx = i; }
    });
    if (idx >= 0) {
        const line = manualLines[idx];
        if (line.series) try { chart.removeSeries(line.series); } catch(_) {}
        manualLines.splice(idx, 1);
    }
}

/* ══════════════════════════════════════════
   SAVE CHART AS IMAGE
══════════════════════════════════════════ */
function saveChart() {
    try {
        const chartCanvas = chart.takeScreenshot();
        const out = document.createElement('canvas');
        out.width  = chartCanvas.width;
        out.height = chartCanvas.height;
        const ctx  = out.getContext('2d');

        // Draw chart base
        ctx.drawImage(chartCanvas, 0, 0);

        // Overlay shimmer canvas (scaled to match)
        if (shimCanvas) {
            ctx.drawImage(shimCanvas, 0, 0, out.width, out.height);
        }

        const now = new Date();
        const ts  = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        const a   = document.createElement('a');
        a.download = `TRX_Chart_${ts}.png`;
        a.href     = out.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    } catch(e) {
        alert('Save failed: ' + e.message);
    }
}
